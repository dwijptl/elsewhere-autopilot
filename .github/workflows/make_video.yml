name: Make Video

on:
  schedule:
    # WEEKLY — Wednesday 04:00 UTC. One episode a week, and not one more until
    # ten episodes hold retention (docs/CHANNEL2_PLAN.md §6). The world needs to
    # be right more than it needs to be fast.
    #
    # Deliberately offset from Terra Incognita's Mon/Thu runs: channel 2 must
    # never starve channel 1 of runner time or of Dwij's review attention.
    #
    # Review the render, then SCHEDULE the YouTube publish for 15:00-17:00 UTC
    # (US morning + EU evening — this is an English channel now, the IST
    # publishing logic from channel 1 does not apply).
    - cron: "0 4 * * 3"
  workflow_dispatch:
    inputs:
      topic:
        description: "Optional: force a specific case (leave empty for auto)"
        required: false
        default: ""
      script_file:
        description: "Optional: repo path to a hand-written script JSON (skips the LLM writer)"
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: make-video
  cancel-in-progress: false

jobs:
  make-video:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: System dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg espeak-ng fonts-dejavu-core fonts-noto-core

      - name: Cache Kokoro TTS model (fallback voice, downloaded only if used)
        uses: actions/cache@v4
        with:
          path: ~/.cache/kokoro
          key: kokoro-model-v1.0

      - name: Set up Node (for the Remotion renderer)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache Remotion node_modules (includes headless Chrome)
        uses: actions/cache@v4
        with:
          path: remotion/node_modules
          key: remotion-${{ hashFiles('remotion/package.json') }}

      - name: Node dependencies (Remotion)
        working-directory: remotion
        run: npm install --no-audit --no-fund

      - name: Python dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        id: pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          SARVAM_API_KEY: ${{ secrets.SARVAM_API_KEY }}
          SARVAM_SPEAKER: ${{ secrets.SARVAM_SPEAKER }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_VOICE_ID: ${{ secrets.ELEVENLABS_VOICE_ID }}
          FAL_KEY: ${{ secrets.FAL_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FORCED_TOPIC: ${{ github.event.inputs.topic }}
          SCRIPT_FILE: ${{ github.event.inputs.script_file }}
        run: python pipeline/run.py

      - name: Publish release (your dated "folder")
        if: ${{ always() && steps.pipeline.outputs.stamp != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
          STAMP: ${{ steps.pipeline.outputs.stamp }}
          OUTDIR: ${{ steps.pipeline.outputs.dir }}
          VTITLE: ${{ steps.pipeline.outputs.title }}
          DRAFT_RELEASE: ${{ steps.pipeline.outputs.draft_release }}
        run: |
          draft=()
          title="$STAMP — $VTITLE"
          if [ "$DRAFT_RELEASE" = "true" ]; then
            draft=(--draft)
            title="⚠️ REVIEW — $title"
          fi
          gh release create "video-$STAMP" \
            "$OUTDIR/final.mp4" \
            "$OUTDIR/captions.srt" \
            "$OUTDIR/thumbnail.jpg" \
            "$OUTDIR/script.json" \
            "$OUTDIR/run_summary.json" \
            "$OUTDIR/quality_report.json" \
            --title "$title" \
            --notes-file "$OUTDIR/metadata.md" \
            "${draft[@]}"

      - name: Save topic history + asset usage log
        if: ${{ always() && steps.pipeline.outputs.stamp != '' }}
        run: |
          git config user.name "faceless-autopilot"
          git config user.email "actions@users.noreply.github.com"
          git add topics_done.txt assets_used.json
          git commit -m "log run (${{ steps.pipeline.outputs.stamp }})" || echo "nothing to commit"
          git pull --rebase origin ${{ github.ref_name }} || true
          git push
